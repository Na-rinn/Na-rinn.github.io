<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        window.onload = () => {
          const hash = window.location.hash; // ex: #access_token=...
          if (hash) {
            const redirectUrl = `lolplatform://callback${hash}`;
            window.location.href = redirectUrl;
            document.getElementById("link").href = redirectUrl;
          }
        };
    </script>
</head>
<body>
<h2>앱으로 리디렉션 중입니다...</h2>
<p>자동으로 이동하지 않으면 아래 버튼을 눌러주세요.</p>
<a id="link" href="#"><button>앱으로 돌아가기</button></a>
</body>
</html>
